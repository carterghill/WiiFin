name: Build WiiFin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkitppc:latest

    steps:
      - name: Checkout WiiFin
        uses: actions/checkout@v4

      - name: Install portlibs
        run: |
          dkp-pacman -Syu --needed --noconfirm
          dkp-pacman -S --needed --noconfirm \
            wii-dev \
            ppc-libpng ppc-freetype ppc-libjpeg-turbo \
            libfat-ogc ppc-libmad ppc-brotli
          apt-get update
          apt-get install -y cmake xxd || apt-get install -y cmake vim-common

      - name: Build & install GRRLIB
        run: |
          git clone --depth 1 https://github.com/GRRLIB/GRRLIB.git /tmp/GRRLIB
          cd /tmp/GRRLIB
          git apply "$GITHUB_WORKSPACE/.github/patches/grrlib-reinit.patch"
          /opt/devkitpro/portlibs/wii/bin/powerpc-eabi-cmake -B build
          cmake --build build --target install

      - name: Build mbedTLS for PPC
        run: |
          git clone --depth 1 --branch v3.6.2 --recurse-submodules \
            https://github.com/Mbed-TLS/mbedtls.git /tmp/mbedtls
          cd /tmp/mbedtls
          sed -i 's|^//#define MBEDTLS_NO_PLATFORM_ENTROPY|#define MBEDTLS_NO_PLATFORM_ENTROPY|' \
            include/mbedtls/mbedtls_config.h
          sed -i 's|^#define MBEDTLS_HAVE_TIME$|//#define MBEDTLS_HAVE_TIME|' \
            include/mbedtls/mbedtls_config.h
          sed -i 's|^#define MBEDTLS_HAVE_TIME_DATE$|//#define MBEDTLS_HAVE_TIME_DATE|' \
            include/mbedtls/mbedtls_config.h
          sed -i 's|^#define MBEDTLS_TIMING_C$|//#define MBEDTLS_TIMING_C|' \
            include/mbedtls/mbedtls_config.h
          sed -i 's|^#define MBEDTLS_NET_C$|//#define MBEDTLS_NET_C|' \
            include/mbedtls/mbedtls_config.h
          /opt/devkitpro/portlibs/wii/bin/powerpc-eabi-cmake -B build \
            -DENABLE_PROGRAMS=OFF \
            -DENABLE_TESTING=OFF \
            -DMBEDTLS_FATAL_WARNINGS=OFF \
            -DUSE_SHARED_MBEDTLS_LIBRARY=OFF \
            -DUSE_STATIC_MBEDTLS_LIBRARY=ON
          cmake --build build
          DEST="$GITHUB_WORKSPACE/libs/mbedtls"
          mkdir -p "$DEST/include" "$DEST/lib"
          cp -r include/* "$DEST/include/"
          find build -name '*.a' -exec cp {} "$DEST/lib/" \;
          echo "mbedTLS libs:" && ls -la "$DEST/lib"

      - name: Build WiiFin
        run: make -j"$(nproc)"

      - name: Package boot.dol
        run: |
          test -f WiiFin.dol
          mkdir -p out/apps/wiifin
          cp WiiFin.dol out/apps/wiifin/boot.dol
          cp WiiFin.dol out/boot.dol

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiiFin-dol
          path: out/
